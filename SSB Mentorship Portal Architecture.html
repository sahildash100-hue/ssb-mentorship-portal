document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

32,.45), rgba(91,87,232,0) 70%);\"><\u002Fdiv>\n    <div style=\"position:relative;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.28em; color:#8C8CF0; font-weight:600;\">ARCHITECTURE&nbsp;&nbsp;OVERVIEW<\u002Fdiv>\n      <h1 style=\"margin:18px 0 0; font-size:54px; line-height:1.02; font-weight:800; letter-spacing:-.03em;\">SSB Mentorship<br>Booking Portal<\u002Fh1>\n      <p style=\"margin:22px 0 0; max-width:780px; font-size:18px; line-height:1.6; color:#B6B6C2; text-wrap:pretty;\">A single <strong style=\"color:#fff; font-weight:600;\">Google Apps Script<\u002Fstrong> web app is the whole backend <em style=\"font-style:normal;color:#fff;\">and<\u002Fem> frontend. A <strong style=\"color:#fff;font-weight:600;\">Google Sheet<\u002Fstrong> is the database. Calendar, Zoom &amp; Gmail are the integrations.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-top:30px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500; padding:8px 13px; border-radius:8px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);\"><span style=\"width:7px;height:7px;border-radius:50%;background:#5B57E8;\"><\u002Fspan>Apps Script · Code.gs<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500; padding:8px 13px; border-radius:8px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);\"><span style=\"width:7px;height:7px;border-radius:50%;background:#19B27A;\"><\u002Fspan>Google Sheet = DB<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500; padding:8px 13px; border-radius:8px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);\"><span style=\"width:7px;height:7px;border-radius:50%;background:#3B82F6;\"><\u002Fspan>execute-as-user<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500; padding:8px 13px; border-radius:8px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);\"><span style=\"width:7px;height:7px;border-radius:50%;background:#E0664D;\"><\u002Fspan>ssb.scaler.com owned<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== BODY ===== -->\n  <div style=\"padding:60px 64px 76px;\">\n\n    <!-- ============ 01 SYSTEM ARCHITECTURE ============ -->\n    <section>\n      <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 36px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:8px;\">01<\u002Fspan>\n        <div>\n          <h2 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.025em;\">System architecture<\u002Fh2>\n          <p style=\"margin:8px 0 0; color:#56565F; font-size:15.5px; max-width:820px; text-wrap:pretty;\">One Apps Script web app serves the SPA and runs every server function. A Google Sheet holds the data; Calendar, Zoom and Gmail are reached from the server side.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; width:100%; height:680px;\">\n        {{ heroSvg }}\n        <!-- Browser -->\n        <div style=\"position:absolute; left:40px; top:40px; width:620px; height:130px; background:#FFFFFF; border:1px solid #E6E9F0; border-radius:18px; box-shadow:0 8px 26px rgba(37,99,235,.08); padding:20px 24px; display:flex; flex-direction:column; justify-content:center;\">\n          <div style=\"display:inline-flex; align-self:flex-start; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#2563EB; background:#EAF1FF; padding:4px 9px; border-radius:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#3B82F6;\"><\u002Fspan>CLIENT · SPA<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:700; margin-top:9px;\">Student browser<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#6A6A73; margin-top:3px;\">index.html · javascript.html · styles.html <span style=\"color:#9A9AA2;\">— dark-theme single-page app<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Apps Script -->\n        <div style=\"position:absolute; left:40px; top:250px; width:620px; height:150px; background:#13122A; color:#fff; border:1px solid #2A2950; border-radius:18px; box-shadow:0 12px 34px rgba(91,87,232,.22); padding:22px 26px; display:flex; flex-direction:column; justify-content:center;\">\n          <div style=\"display:inline-flex; align-self:flex-start; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#B7B4FF; background:rgba(91,87,232,.18); padding:4px 9px; border-radius:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#8C8CF0;\"><\u002Fspan>BACKEND + FRONTEND · Code.gs<\u002Fdiv>\n          <div style=\"font-size:21px; font-weight:700; margin-top:9px;\">Apps Script server functions<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#A9A8C4; margin-top:4px;\">auth · booking · availability · feedback · emails<\u002Fdiv>\n          <div style=\"position:absolute; right:22px; top:22px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; color:#C9C8FF; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); padding:5px 10px; border-radius:7px;\">executes AS the signed-in user<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Sheet -->\n        <div style=\"position:absolute; left:40px; top:480px; width:620px; height:160px; background:#FFFFFF; border:1px solid #DBEFE5; border-radius:18px; box-shadow:0 8px 26px rgba(14,154,110,.10); padding:20px 24px; display:flex; flex-direction:column; justify-content:center;\">\n          <div style=\"display:inline-flex; align-self:flex-start; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#0E8A60; background:#E6F6EF; padding:4px 9px; border-radius:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#19B27A;\"><\u002Fspan>DATABASE<\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:700; margin-top:9px;\">Google Sheet <span style=\"color:#9A9AA2; font-weight:500; font-size:15px;\">— mapped by header name<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:13px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; padding:6px 11px; border-radius:8px; background:#F3F7F5; border:1px solid #DBEFE5; color:#1F5C46;\">Student Data<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; padding:6px 11px; border-radius:8px; background:#F3F7F5; border:1px solid #DBEFE5; color:#1F5C46;\">Mentor Details<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; padding:6px 11px; border-radius:8px; background:#F3F7F5; border:1px solid #DBEFE5; color:#1F5C46;\">Master Session Details<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; padding:6px 11px; border-radius:8px; background:#FBF3E8; border:1px solid #F0DDBE; color:#8A5A12;\">Avail_&lt;MentorID&gt; · locked<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Calendar -->\n        <div style=\"position:absolute; left:900px; top:40px; width:380px; height:100px; background:#FFFFFF; border:1px solid #E6E9F0; border-radius:16px; box-shadow:0 6px 20px rgba(20,20,30,.06); padding:0 22px; display:flex; align-items:center; gap:15px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#3B82F6; flex:none;\"><\u002Fspan>\n          <div><div style=\"font-size:17px; font-weight:700;\">Google Calendar<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#6A6A73; margin-top:2px;\">Advanced Calendar Service<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Zoom -->\n        <div style=\"position:absolute; left:900px; top:270px; width:380px; height:100px; background:#FFFFFF; border:1px solid #E6E9F0; border-radius:16px; box-shadow:0 6px 20px rgba(20,20,30,.06); padding:0 22px; display:flex; align-items:center; gap:15px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#0BA5EC; flex:none;\"><\u002Fspan>\n          <div><div style=\"font-size:17px; font-weight:700;\">Zoom<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#6A6A73; margin-top:2px;\">mentor's personal room link<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Gmail -->\n        <div style=\"position:absolute; left:900px; top:500px; width:380px; height:100px; background:#FFFFFF; border:1px solid #E6E9F0; border-radius:16px; box-shadow:0 6px 20px rgba(20,20,30,.06); padding:0 22px; display:flex; align-items:center; gap:15px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#E0664D; flex:none;\"><\u002Fspan>\n          <div><div style=\"font-size:17px; font-weight:700;\">Gmail<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#6A6A73; margin-top:2px;\">confirmations / notifications<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- key property -->\n      <div style=\"display:flex; gap:16px; margin-top:8px; padding:22px 26px; background:#F6F5FF; border:1px solid #E4E2FB; border-left:4px solid #5B57E8; border-radius:14px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#5B57E8; padding-top:2px; white-space:nowrap;\">KEY PROPERTY<\u002Fdiv>\n        <p style=\"margin:0; font-size:15px; line-height:1.6; color:#3A3A45; text-wrap:pretty;\">The web app is deployed <strong>\"execute as the user accessing it.\"<\u002Fstrong> Every request runs as that student's Google identity — which is how silent login works, and why the project is <strong>owned by an <code style=\"font-family:'JetBrains Mono',monospace;background:#ECEAFB;padding:2px 6px;border-radius:5px;\">ssb.scaler.com<\u002Fcode> account<\u002Fstrong>: same domain as the reviewer means no third-party app block.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 02 DATA MODEL ============ -->\n    <section style=\"border-top:1px solid #ECECE6; margin-top:64px; padding-top:52px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 36px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:8px;\">02<\u002Fspan>\n        <div>\n          <h2 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.025em;\">Data model<\u002Fh2>\n          <p style=\"margin:8px 0 0; color:#56565F; font-size:15.5px; max-width:820px; text-wrap:pretty;\">Four tabs in one Google Sheet. The code maps columns <strong>by header name<\u002Fstrong> — order can change, spelling can't. <code style=\"font-family:'JetBrains Mono',monospace;background:#F1F0EC;padding:2px 6px;border-radius:5px;\">Master Session Details<\u002Fcode> is the hub: every booking and its feedback lives there.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; width:100%; height:520px;\">\n        {{ erSvg }}\n        <!-- Student Data -->\n        <div style=\"position:absolute; left:40px; top:170px; width:300px; background:#FFFFFF; border:1px solid #E6E9F0; border-radius:16px; box-shadow:0 8px 24px rgba(37,99,235,.08); overflow:hidden;\">\n          <div style=\"background:#EAF1FF; padding:13px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #DCE7FB;\"><span style=\"font-weight:700; font-size:15px; color:#1E40AF;\">Student Data<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#3B82F6;\">login lookup<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:6px 0;\">\n            <div style=\"display:flex; justify-content:space-between; padding:8px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;\">Student Email<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#3B82F6;\">key<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:8px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3A3A45;\">Full Name<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:8px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3A3A45;\">Roll No<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:8px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3A3A45;\">Batch<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Master (hub) -->\n        <div style=\"position:absolute; left:500px; top:30px; width:360px; background:#FFFFFF; border:1.5px solid #C9C6F7; border-radius:16px; box-shadow:0 14px 40px rgba(91,87,232,.16); overflow:hidden;\">\n          <div style=\"background:#5B border-bottom:1px solid #CFEADD;\"><span style=\"font-weight:700; font-size:15px; color:#0E7A55;\">Mentor Details<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#19B27A;\">profiles<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:5px 0;\">\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600;\">ID<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#19B27A;\">key<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">Name · Email<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">University<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">Current Role · Org<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">Skills<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">MeetingLink<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#0BA5EC;\">zoom<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:6.5px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#9A9AA2;\">PhotoLink · Year of Exp …<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">+<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Avail -->\n        <div style=\"position:absolute; left:980px; top:362px; width:300px; background:#FFFFFF; border:1px solid #F0DDBE; border-radius:16px; box-shadow:0 8px 24px rgba(217,130,43,.10); overflow:hidden;\">\n          <div style=\"background:#FBF3E8; padding:13px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #F0E2C9;\"><span style=\"font-weight:700; font-size:15px; color:#8A5A12;\">Avail_&lt;MentorID&gt;<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#C08A2E;\">locked · per mentor<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:5px 0;\">\n            <div style=\"display:flex; justify-content:space-between; padding:7px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">Day<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; padding:7px 18px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#3A3A45;\">Start Time<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9A9AA2;\">text<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:6px 18px 4px; font-size:11.5px; color:#A98A4E; font-style:italic;\">recurring weekly rules<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 03 AVAILABILITY → SLOTS ============ -->\n    <section style=\"border-top:1px solid #ECECE6; margin-top:64px; padding-top:52px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 36px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:8px;\">03<\u002Fspan>\n        <div>\n          <h2 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.025em;\">Availability → bookable slots<\u002Fh2>\n          <p style=\"margin:8px 0 0; color:#56565F; font-size:15.5px; max-width:820px; text-wrap:pretty;\">The mentor keeps a fixed weekly schedule. The server expands those rules into concrete dated slots for the next <strong>4 weeks<\u002Fstrong>, dropping past times and already-booked ones.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:stretch; gap:0;\">\n        <!-- step 1 -->\n        <div style=\"flex:1; background:#FBF3E8; border:1px solid #F0DDBE; border-radius:16px; padding:22px 24px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#C08A2E;\">SOURCE<\u002Fdiv>\n          <div style=\"font-size:17px; font-weight:700; margin-top:10px;\">Avail_&lt;ID&gt; tab<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#8A5A12; margin-top:5px;\">Day + Start Time — weekly rules<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; padding:0 8px; color:#C2C2C8; font-size:26px; flex:none;\">›<\u002Fdiv>\n        <!-- step 2 -->\n        <div style=\"flex:1.2; background:#13122A; color:#fff; border:1px solid #2A2950; border-radius:16px; padding:22px 24px; box-shadow:0 10px 28px rgba(91,87,232,.18);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#B7B4FF;\">SERVER<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:600; margin-top:10px;\">getMentorSlots()<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#A9A8C4; margin-top:5px;\">generate next 4 weeks &nbsp;−&nbsp; past &nbsp;−&nbsp; booked<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; padding:0 8px; color:#C2C2C8; font-size:26px; flex:none;\">›<\u002Fdiv>\n        <!-- step 3 -->\n        <div style=\"flex:1; background:#EAF1FF; border:1px solid #DCE7FB; border-radius:16px; padding:22px 24px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#3B82F6;\">CLIENT<\u002Fdiv>\n          <div style=\"font-size:17px; font-weight:700; margin-top:10px;\">Booking modal<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#1E40AF; margin-top:5px;\">calendar date → slot pills<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; padding:0 8px; color:#C2C2C8; font-size:26px; flex:none;\">›<\u002Fdiv>\n        <!-- step 4 -->\n        <div style=\"flex:.85; background:#F6F5FF; border:1px solid #E4E2FB; border-radius:16px; padding:22px 24px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.1em; color:#5B57E8;\">ACTION<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600; margin-top:10px;\">bookSession()<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5B57E8; margin-top:5px;\">commit the slot<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 04 BOOKING WORKFLOW ============ -->\n    <section style=\"border-top:1px solid #ECECE6; margin-top:64px; padding-top:52px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 36px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:8px;\">04<\u002Fspan>\n        <div>\n          <h2 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.025em;\">Booking workflow<\u002Fh2>\n          <p style=\"margin:8px 0 0; color:#56565F; font-size:15.5px; max-width:820px; text-wrap:pretty;\">From \"Confirm\" to a booked session: validate, create the calendar invite, write the Master row, send three emails. A <code style=\"font-family:'JetBrains Mono',monospace;background:#F1F0EC;padding:2px 6px;border-radius:5px;\">LockService<\u002Fcode> serializes the session-number assignment and write.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <!-- row template repeated -->\n        <div style=\"display:grid; grid-template-columns:46px 268px 1fr; gap:22px; align-items:center; background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:18px 22px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#C7C7CE;\">01<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#3B82F6; padding:4px 10px; border-radius:7px;\">Student<\u002Fspan><span style=\"color:#B5B5BC;\">→<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#5B57E8; padding:4px 10px; border-radius:7px;\">App<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:15px; color:#2A2A33;\">pick mentor + slot → <strong>Confirm<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:46px 268px 1fr; gap:22px; align-items:center; background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:18px 22px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#C7C7CE;\">02<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#5B57E8; padding:4px 10px; border-radius:7px;\">App<\u002Fspan><span style=\"color:#B5B5BC;\">↻<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#5B57E8; background:#EEEDFE; padding:4px 10px; border-radius:7px;\">validate<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:15px; color:#2A2A33;\">future · not duplicate / overlap · mentor free · slot is published<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:46px 268px 1fr; gap:22px; align-items:center; background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:18px 22px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#C7C7CE;\">03<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#5B57E8; padding:4px 10px; border-radius:7px;\">App<\u002Fspan><span style=\"color:#B5B5BC;\">→<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#3B82F6; padding:4px 10px; border-radius:7px;\">Calendar<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:15px; color:#2A2A33;\">create event (attendees = student + mentor) &nbsp;<span style=\"font-size:13px; color:#8A8A93;\">— meeting link = mentor's Zoom room, no auto-Meet<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:46px 268px 1fr; gap:22px; align-items:center; background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:18px 22px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#C7C7CE;\">04<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#5B57E8; padding:4px 10px; border-radius:7px;\">App<\u002Fspan><span style=\"color:#B5B5BC;\">→<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#19B27A; padding:4px 10px; border-radius:7px;\">Sheet<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:15px; color:#2A2A33;\">append row to Master <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#6A6A73;\">(MSN-#, datetime, Zoom link)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:46px 268px 1fr; gap:22px; align-items:center; background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:18px 22px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#C7C7CE;\">05<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#5B57E8; padding:4px 10px; border-radius:7px;\">App<\u002Fspan><span style=\"color:#B5B5BC;\">→<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#E0664D; padding:4px 10px; border-radius:7px;\">Gmail<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:15px; color:#2A2A33;\">confirmation → student &nbsp;·&nbsp; notification → mentor<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:46px 268px 1fr; gap:22px; align-items:center; background:#F4FBF7; border:1px solid #CFEADD; border-radius:14px; padding:18px 22px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#19B27A;\">06<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#5B57E8; padding:4px 10px; border-radius:7px;\">App<\u002Fspan><span style=\"color:#B5B5BC;\">→<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:#fff; background:#3B82F6; padding:4px 10px; border-radius:7px;\">Student<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:15px; color:#1F6B4C; font-weight:600;\">booked ✓ &nbsp;<span style=\"font-weight:400; color:#2A2A33;\">Zoom link + calendar invite delivered<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 05 COMPLETION & FEEDBACK ============ -->\n    <section style=\"border-top:1px solid #ECECE6; margin-top:64px; padding-top:52px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 36px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:8px;\">05<\u002Fspan>\n        <div>\n          <h2 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.025em;\">Completion &amp; feedback<\u002Fh2>\n          <p style=\"margin:8px 0 0; color:#56565F; font-size:15.5px; max-width:820px; text-wrap:pretty;\">A small state machine. Mentor feedback unlocks only when <strong>both<\u002Fstrong> sides confirm the meeting happened — and a feedback <em style=\"font-style:normal;font-weight:600;\">gate<\u002Fem> blocks re-booking until past sessions are reviewed.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; width:100%; height:340px;\">\n        {{ stateSvg }}\n        <!-- Booked -->\n        <div style=\"position:absolute; left:90px; top:140px; width:150px; height:60px; display:flex; align-items:center; justify-content:center; background:#13122A; color:#fff; border-radius:30px; font-weight:700; font-size:16px; box-shadow:0 8px 22px rgba(19,18,42,.25);\">Booked<\u002Fdiv>\n        <!-- Student_Completed -->\n        <div style=\"position:absolute; left:430px; top:44px; width:250px; height:74px; display:flex; flex-direction:column; justify-content:center; padding:0 22px; background:#F6F5FF; border:1.5px solid #C9C6F7; border-radius:18px;\">\n          <div style=\"font-weight:700; font-size:15px; color:#3B38C9;\">Student_Completed<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#6A6A86; margin-top:2px;\">\"Mark complete\" → emails mentor a feedback link<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Done -->\n        <div style=\"position:absolute; left:820px; top:44px; width:170px; height:74px; display:flex; flex-direction:column; justify-content:center; padding:0 22px; background:#F4FBF7; border:1.5px solid #BFE6D4; border-radius:18px;\">\n          <div style=\"font-weight:700; font-size:15px; color:#0E7A55;\">Done<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#5A8A74; margin-top:2px;\">mentor writes feedback<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Student_Feedback -->\n        <div style=\"position:absolute; left:430px; top:232px; width:290px; height:74px; display:flex; flex-direction:column; justify-content:center; padding:0 22px; background:#FFFFFF; border:1.5px solid #E4E2FB; border-radius:18px;\">\n          <div style=\"font-weight:700; font-size:15px; color:#3B38C9;\">Student_Feedback<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#6A6A86; margin-top:2px;\">submits feedback — text + rating 1–5<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- gate note -->\n        <div style=\"position:absolute; left:760px; top:236px; width:340px; padding:16px 20px; background:#FBF3E8; border:1px solid #F0DDBE; border-left:4px solid #D9822B; border-radius:12px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:600; letter-spacing:.1em; color:#C08A2E;\">FEEDBACK GATE<\u002Fdiv>\n          <div style=\"font-size:13px; color:#8A5A12; margin-top:5px; line-height:1.5;\">Can't re-book until past completed sessions are reviewed.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:8px;\">\n        <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:20px 22px;\">\n          <div style=\"font-weight:700; font-size:15px;\">Student feedback<\u002Fdiv>\n          <p style=\"margin:7px 0 0; font-size:13.5px; color:#56565F; line-height:1.55;\">Stored in <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">MSN-StudentFeedback<\u002Fcode> / <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">MSN-StudentRating<\u002Fcode>. Visible to the student in the feedback viewer.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:14px; padding:20px 22px;\">\n          <div style=\"font-weight:700; font-size:15px;\">Mentor feedback<\u002Fdiv>\n          <p style=\"margin:7px 0 0; font-size:13.5px; color:#56565F; line-height:1.55;\">Stored in <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">MSN-MentorFeedback<\u002Fcode> / <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">MSN-MentorRating<\u002Fcode>, entered in the sheet directly or via the emailed sheet link.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 06 INTEGRATIONS & AUTOMATION ============ -->\n    <section style=\"border-top:1px solid #ECECE6; margin-top:64px; padding-top:52px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 36px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:8px;\">06<\u002Fspan>\n        <div>\n          <h2 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.025em;\">Integrations &amp; automation<\u002Fh2>\n          <p style=\"margin:8px 0 0; color:#56565F; font-size:15.5px; max-width:820px; text-wrap:pretty;\">Four Google / Zoom services, all reached server-side — plus the automation that runs without manual upkeep.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1.6fr 1fr; gap:24px; align-items:start;\">\n        <!-- table -->\n        <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:16px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:200px 1fr 1fr; gap:20px; padding:14px 24px; background:#FAFAF8; border-bottom:1px solid #ECECE6; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.08em; color:#9A9AA2;\"><div>INTEGRATION<\u002Fdiv><div>USE<\u002Fdiv><div>HOW<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:200px 1fr 1fr; gap:20px; padding:18px 24px; border-bottom:1px solid #F1F1EC; align-items:center;\"><div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#3B82F6;\"><\u002Fspan><strong style=\"font-size:14.5px;\">Google Calendar<\u002Fstrong><\u002Fdiv><div style=\"font-size:13.5px; color:#56565F;\">Session invite to both parties<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#56565F;\">Events.insert<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:200px 1fr 1fr; gap:20px; padding:18px 24px; border-bottom:1px solid #F1F1EC; align-items:center;\"><div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#0BA5EC;\"><\u002Fspan><strong style=\"font-size:14.5px;\">Zoom<\u002Fstrong><\u002Fdiv><div style=\"font-size:13.5px; color:#56565F;\">The actual meeting room<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#56565F;\">MeetingLink (personal room)<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:200px 1fr 1fr; gap:20px; padding:18px 24px; border-bottom:1px solid #F1F1EC; align-items:center;\"><div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#E0664D;\"><\u002Fspan><strong style=\"font-size:14.5px;\">Gmail<\u002Fstrong><\u002Fdiv><div style=\"font-size:13.5px; color:#56565F;\">Confirmation · notification · feedback request<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#56565F;\">GmailApp.sendEmail (HTML)<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:200px 1fr 1fr; gap:20px; padding:18px 24px; align-items:center;\"><div style=\"display:flex; align-items:center; gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#19B27A;\"><\u002Fspan><strong style=\"font-size:14.5px;\">Google Sheet<\u002Fstrong><\u002Fdiv><div style=\"font-size:13.5px; color:#56565F;\">Database — read/write live<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#56565F;\">SpreadsheetApp, header-mapped<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- automation -->\n        <div style=\"background:#13122A; color:#fff; border-radius:16px; padding:24px 26px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.12em; color:#B7B4FF;\">AUTOMATION BUILT IN<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:16px; margin-top:18px;\">\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#8C8CF0; flex:none; font-weight:700;\">+<\u002Fspan><div style=\"font-size:13.5px; line-height:1.5; color:#D5D5E2;\">Auto meeting + invite + 3 emails on booking / completion.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#8C8CF0; flex:none; font-weight:700;\">+<\u002Fspan><div style=\"font-size:13.5px; line-height:1.5; color:#D5D5E2;\">Recurring slot generation (4 weeks) from weekly rules — no manual dated entries.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#8C8CF0; flex:none; font-weight:700;\">+<\u002Fspan><div style=\"font-size:13.5px; line-height:1.5; color:#D5D5E2;\"><code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#B7B4FF;\">onEdit<\u002Fcode> format guard — normalizes typed Day / Start Time (<code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#B7B4FF;\">mon→Monday<\u002Fcode>, <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#B7B4FF;\">5pm→17:00<\u002Fcode>).<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\"><span style=\"color:#8C8CF0; flex:none; font-weight:700;\">+<\u002Fspan><div style=\"font-size:13.5px; line-height:1.5; color:#D5D5E2;\">Idempotent setup — <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#B7B4FF;\">setupEverything<\u002Fcode> / <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#B7B4FF;\">provisionAllMentorSheets<\u002Fcode> / <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#B7B4FF;\">verifySetup<\u002Fcode> re-run safely.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 07 / 08 RELIABILITY + SECURITY ============ -->\n    <section style=\"border-top:1px solid #ECECE6; margin-top:64px; padding-top:52px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:40px;\">\n        <!-- 07 -->\n        <div>\n          <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 28px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:6px;\">07<\u002Fspan>\n            <div><h2 style=\"margin:0; font-size:26px; font-weight:700; letter-spacing:-.025em;\">Reliability &amp; scalability<\u002Fh2><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\"><code style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#5B57E8;\">LockService<\u002Fcode> serializes booking writes<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">No duplicate session numbers, no race double-books.<\u002Fp><\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\">Layered validations<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">Past-date · duplicate · student-overlap · mentor double-booking · slot-must-be-published.<\u002Fp><\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\"><code style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#5B57E8;\">safe_<\u002Fcode>-wrapped side-effects<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">An email or sheet failure never breaks the booking itself.<\u002Fp><\u002Fdiv>\n            <div style=\"background:#F6F5FF; border:1px solid #E4E2FB; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\">Sheet-as-DB trade-off<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">Transparent &amp; zero-cost at cohort scale. For tens of thousands of concurrent bookings, migrate to Firestore / Postgres — the header-mapped layer keeps that localized.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- 08 -->\n        <div>\n          <div style=\"display:flex; align-items:flex-start; gap:18px; margin:0 0 28px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#5B57E8; padding-top:6px;\">08<\u002Fspan>\n            <div><h2 style=\"margin:0; font-size:26px; font-weight:700; letter-spacing:-.025em;\">Security model<\u002Fh2><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\">Allowlist <code style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#5B57E8;\">ALLOWED_STUDENTS<\u002Fcode><\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">Explicit control over who can log in.<\u002Fp><\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\">Silent identity<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\"><code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">Session.getActiveUser().getEmail()<\u002Fcode> — org-domain ownership makes identity reliable and blocks impersonation.<\u002Fp><\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\">Locked availability tabs<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">Protected ranges — only the assigned mentor edits their schedule.<\u002Fp><\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #EAEAE5; border-radius:13px; padding:16px 20px;\"><div style=\"font-weight:600; font-size:14px;\">Per-row ownership checks<\u002Fdiv><p style=\"margin:5px 0 0; font-size:13px; color:#56565F; line-height:1.5;\">Students act only on their own sessions; mentor feedback is matched to the mentor email.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- footer -->\n    <div style=\"border-top:1px solid #ECECE6; margin-top:60px; padding-top:24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#9A9AA2;\">SSB Mentorship Booking Portal · Architecture<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#9A9AA2;\">diagrams adapted from Mermaid source<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const h = React.createElement;\n    const LINE = '#CDD2DC';\n    const FILL = '#AAB0BC';\n\n    const defs = () => h('defs', { key: 'defs' },\n      h('marker', { id: 'ah', viewBox: '0 0 10 10', refX: 8.5, refY: 5, markerWidth: 7, markerHeight: 7, orient: 'auto-start-reverse' },\n        h('path', { d: 'M0,0 L10,5 L0,10 Z', fill: FILL })));\n\n    const path = (key, d, opts) => h('path', Object.assign({ key, d, fill: 'none', stroke: LINE, strokeWidth: 2 }, opts || {}));\n\n    const label = (key, x, y, text, color) => {\n      const w = text.length * 6.4 + 18;\n      return h('g', { key },\n        h('rect', { x: x - w / 2, y: y - 11, width: w, height: 22, rx: 11, fill: '#FFFFFF', stroke: '#E6E6E1' }),\n        h('text', { x, y: y + 4, textAnchor: 'middle', fontSize: 11.5, fontFamily: 'JetBrains Mono, monospace', fontWeight: 500, fill: color || '#56565F' }, text));\n    };\n\n    const svg = (key, vb, children) => h('svg', { key, width: '100%', height: '100%', viewBox: vb, style: { position: 'absolute', inset: 0, pointerEvents: 'none' } }, children);\n\n    // ---- HERO connectors (1320 x 680) ----\n    const heroSvg = svg('hero', '0 0 1320 680', [\n      defs(),\n      path('h1', 'M350,170 L350,250', { markerStart: 'url(#ah)', markerEnd: 'url(#ah)' }),\n      path('h2', 'M350,400 L350,480', { markerStart: 'url(#ah)', markerEnd: 'url(#ah)' }),\n      path('h3', 'M660,300 C 790,300 790,90 900,90', { markerEnd: 'url(#ah)' }),\n      path('h4', 'M660,325 C 790,325 790,320 900,320', { markerEnd: 'url(#ah)' }),\n      path('h5', 'M660,350 C 790,350 790,550 900,550', { markerEnd: 'url(#ah)' }),\n      label('hl1', 350, 210, 'google.script.run', '#5B57E8'),\n      label('hl2', 350, 440, 'read / write'),\n      label('hl3', 781, 162, 'create invite', '#3B82F6'),\n      label('hl4', 781, 318, 'attach join link', '#0BA5EC'),\n      label('hl5', 781, 472, 'send mail', '#E0664D'),\n    ]);\n\n    // ---- ER connectors (1320 x 520) ----\n    const erSvg = svg('er', '0 0 1320 520', [\n      defs(),\n      path('e1', 'M340,265 L500,265', { markerEnd: 'url(#ah)' }),\n      path('e2', 'M980,175 L860,175', { markerEnd: 'url(#ah)' }),\n      path('e3', 'M1130,320 L1130,362', { markerEnd: 'url(#ah)' }),\n      label('el1', 420, 250, 'books · 1:N', '#3B82F6'),\n      label('el2', 920, 160, 'mentors · 1:N', '#19B27A'),\n      label('el3', 1130, 341, 'owns · 1:1 (locked)', '#C08A2E'),\n    ]);\n\n    // ---- STATE machine (1320 x 340) ----\n    const stateSvg = svg('state', '0 0 1320 340', [\n      defs(),\n      h('circle', { key: 'sdot', cx: 50, cy: 170, r: 7, fill: '#5B57E8' }),\n      h('circle', { key: 'edot', cx: 1034, cy: 81, r: 8, fill: '#FFFFFF', stroke: '#5B57E8', strokeWidth: 2 }),\n      h('circle', { key: 'edot2', cx: 1034, cy: 81, r: 3.5, fill: '#5B57E8' }),\n      path('a0', 'M58,170 L86,170', { markerEnd: 'url(#ah)' }),\n      path('a1', 'M240,162 C 330,155 350,88 426,81', { markerEnd: 'url(#ah)' }),\n      path('a2', 'M680,81 L816,81', { markerEnd: 'url(#ah)' }),\n      path('a3', 'M990,81 L1024,81', { markerEnd: 'url(#ah)' }),\n      path('a4', 'M240,178 C 330,185 350,262 426,269', { markerEnd: 'url(#ah)' }),\n      label('stl1', 332, 116, 'student: Mark complete', '#5B57E8'),\n      label('stl2', 748, 66, 'mentor writes feedback', '#0E7A55'),\n      label('stl3', 322, 232, 'submits feedback (1–5)', '#5B57E8'),\n    ]);\n\n    return { heroSvg, erSvg, stateSvg };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
