  <!-- Loading overlay -->
  <div id="overlay" class="overlay">

      <div class="custom-loader"></div>
      <div class="mt-4 text-muted small" id="overlayMsg" style="letter-spacing:0.06em; text-transform:uppercase;">Loading…</div>

    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title d-flex align-items-center"><i class="bi bi-calendar-plus text-primary me-2"></i>Book a Session</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

          </div>
          <div class="mb-3">
            <label class="form-label text-muted small fw-semibold">AVAILABLE SLOTS</label>
            <div id="bookSlots"><div class="text-muted small py-2">Loading availability…</div></div>
            <div class="form-text text-muted mt-2"><i class="bi bi-info-circle me-1"></i>All sessions are 60 minutes long.</div>

        <div class="modal-header">
          <h5 class="modal-title d-flex align-items-center"><i class="bi bi-chat-square-text text-primary me-2"></i>Session Feedback</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

            <label class="form-label text-muted small d-block fw-semibold">RATING</label>

        <div class="modal-footer">

          <button class="btn btn-primary" id="fbSubmit"><i class="bi bi-send me-1"></i>Submit Feedback</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Feedback viewer modal -->
